    <style>
        /* Loading screen styles */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black; /* Black background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 2s ease; /* Fade-out transition */
        }

        .loader {
            border: 4px solid white; /* Solid white border */
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            border-top-color: transparent; /* Make top section of the circle transparent */
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Fade out animation */
        #loadingScreen.fadeOut {
            opacity: 0;
            pointer-events: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            padding-bottom: 60px;
            background-color: #8B0000; /* Dark Red Background */
            color: white;
            overflow: hidden; /* Disable scrolling initially */
        }

        h1 {
            margin: 20px 0;
            font-size: 1.5em;
            text-align: center;
            white-space: nowrap;
        }

        h2, button, footer {
            font-family: 'Arial', sans-serif;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            max-height: 80vh;
            width: 100%;
        }

        button {
            margin: 15px 0;
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            text-align: center;
            background-color: #8B0000; /* Dark Red Background */
            color: white;
        }

        #gameFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
            display: none; /* Hide initially */
            z-index: 9998; /* Behind loading screen */
            overflow: auto; /* Enable scrolling */
        }
    </style>
</head>

    <script>
        // Disable scrolling during loading
        window.onload = function() {
            setTimeout(function() {
                // Fade out the loading screen
                document.getElementById('loadingScreen').classList.add('fadeOut');
                // Enable scrolling once the loading screen fades out
                document.body.style.overflow = 'auto'; // Enable scrolling
            }, 2000); // Wait for 2 seconds before fading out
        };

        function loadGame(url) {
            var frame = document.getElementById('gameFrame');
            frame.src = url;
            frame.style.display = 'block'; // Show iframe
            history.pushState({url: url}, '', url); // Add state to history
        }

        function redirect(url) {
            window.location.href = url;
        }

        // Handle browser back button
        window.onpopstate = function(event) {
            var frame = document.getElementById('gameFrame');
            if (event.state) {
                frame.src = event.state.url;
                frame.style.display = 'block';
            } else {
                frame.src = '';
                frame.style.display = 'none';
            }
        };

        // Close iframe on Escape key press (desktop)
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                var frame = document.getElementById('gameFrame');
                frame.src = '';
                frame.style.display = 'none';
                history.pushState(null, '', window.location.pathname);
            }
        });

        // Close iframe on swipe down (mobile)
        let touchstartY = 0;
        let touchendY = 0;
        const swipeThreshold = 100; // Minimum swipe distance to close

        function handleGesture() {
            if (touchendY > touchstartY + swipeThreshold) {
                var frame = document.getElementById('gameFrame');
                frame.src = '';
                frame.style.display = 'none';
                history.pushState(null, '', window.location.pathname);
            }
        }

        document.addEventListener('touchstart', function(event) {
            touchstartY = event.changedTouches[0].screenY;
        }, false);

        document.addEventListener('touchend', function(event) {
            touchendY = event.changedTouches[0].screenY;
            handleGesture();
        }, false);
    </script>
